name: Package extension

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: paper-scorecard-extension
          path: dist/paper-scorecard-extension.zip
